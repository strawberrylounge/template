<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI TEST</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/common.css" />

    <!-- jQuery -->
    <script src="../../assets/js/jquery-3.6.4.min.js"></script>
  </head>
  <body>
    <div class="wrap">
      <div class="inner">
        <!-- 컴포넌트 확인용 -->
        <h1 class="logo"><span class="sr-only"></span></h1>

        <!-- forms -->
        <div class="div">
          <input type="text" class="input" />
          <input type="text" class="input" placeholder="test" />
          <input type="text" class="input" disabled />

          <div
            class="selectbox-wrap"
            role="combobox"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-labelledby="selectboxLabel"
          >
            <span id="selectboxLabel" class="selectbox-label">선택하세요</span>
            <ul class="selectbox-dropdown" role="listbox">
              <li class="selectbox-option" role="option" aria-selected="false">
                선택 1
              </li>
              <li class="selectbox-option" role="option" aria-selected="false">
                선택 1
              </li>
              <li class="selectbox-option" role="option" aria-selected="false">
                선택 1
              </li>
              <li class="selectbox-option" role="option" aria-selected="false">
                선택 1
              </li>
              <li class="selectbox-option" role="option" aria-selected="false">
                선택 1
              </li>
            </ul>
          </div>

          <div class="div">
            <label class="checkbox-wrap">
              <input type="checkbox" />
              <span class="checkbox-icon"></span>
              <span class="checkbox-label">체크박스 텍스트</span>
            </label>

            <!-- 텍스트 없이 사용 -->
            <label class="checkbox-wrap">
              <input type="checkbox" />
              <span class="checkbox-icon"></span>
            </label>

            <!-- disabled 상태 -->
            <label class="checkbox-wrap">
              <input type="checkbox" disabled />
              <span class="checkbox-icon"></span>
              <span class="checkbox-label">비활성화</span>
            </label>
          </div>
        </div>

        <div class="div">
          <!-- SVG 아이콘 사용 방법 -->
          <span aria-hidden="true">
            <jsp:include page="../svg/icons.jsp">
              <jsp:param name="iconName" value="download" />
            </jsp:include>
          </span>

          <jsp:include page="../svg/icons.jsp">
            <jsp:param name="iconName" value="triangle" />
          </jsp:include>

          <jsp:include page="../svg/icons.jsp">
            <jsp:param name="iconName" value="chevron" />
          </jsp:include>
        </div>

        <!-- buttons -->
        <div class="div">
          <button type="button" class="btn-download-material">
            <span class="icon btn-icon icon-download" aria-hidden="true">
              <jsp:include page="../svg/icons.jsp">
                <jsp:param name="iconName" value="download" />
              </jsp:include>
            </span>
            <span class="btn-txt">
              학습자료<br class="pc-only" />
              다운로드
            </span>
          </button>

          <button type="button" class="btn-play">
            <span class="icon btn-icon icon-play" aria-hidden="true">
              <jsp:include page="../svg/icons.jsp">
                <jsp:param name="iconName" value="triangle" />
              </jsp:include>
            </span>
            <span class="sr-only">학습하기</span>
          </button>

          <button type="button" class="btn-play btn-play-mint">
            <span class="icon btn-icon icon-play" aria-hidden="true">
              <jsp:include page="../svg/icons.jsp">
                <jsp:param name="iconName" value="triangle" />
              </jsp:include>
            </span>
            <span class="sr-only">학습하기</span>
          </button>
          <div class="div">
            <button type="button" class="btn btn-primary bg-purple">
              확인
            </button>
            <button type="button" class="btn btn-primary">취소</button>
            <button type="button" class="btn btn-primary disabled" disabled>
              비활성
            </button>
          </div>
          <div class="div">
            <button type="button" class="btn btn-secondary">
              <span class="icon btn-icon icon-phone" aria-hidden="true"
                ><img
                  src="/online/images/sign/icon-phone@2x.png"
                  alt="인증번호 발송" /></span
              >인증번호 발송
            </button>
            <button type="button" class="btn btn-secondary btn-secondary-sm">
              시간 연장
            </button>
          </div>
          <div class="div">
            <!-- 아코디언 -->
            <button
              type="button"
              class="btn-toggle-panel"
              aria-expanded="false"
              aria-controls=""
            >
              <span class="text-open">상세 보기</span>
              <span class="text-close">닫기</span>
              <span class="icon btn-icon" aria-hidden="true">
                <jsp:include page="./svg/icons.jsp">
                  <jsp:param name="iconName" value="chevron" />
                </jsp:include>
              </span>
            </button>
          </div>
        </div>

        <!-- progressbar (강의 리스트, 학습 컨테이너) -->
        <div class="div">
          <div class="progress-lesson">
            <div class="progress-bar-wrap">
              <!-- 
                [TODO] 
                        
                1. 진행률: style="width: 00%;" / aria-valuenow="00"
                2. 진행률이 100%일 시, .completed 클래스 추가
              -->
              <div
                class="progress-bar"
                role="progressbar"
                aria-valuenow=""
                aria-voluemin="0"
                aria-valuemax="100"
                style="width: 20%"
              ></div>
            </div>
            <span class="progress-value">
              <em>30%</em>
              <span class="course-count">
                (<b class="text-purple">2</b>/3)
              </span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
